<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14161b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Execulist">
<title>Execulist</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f1116; --base:#14161b; --panel:#1c1f27; --panel-2:#20242e;
    --line:#2a2e39; --line-soft:#23262f;
    --text:#e8e9ed; --muted:#8a8f9c; --muted-2:#6b7280;
    --p1:#e5484d; --p2:#e8912a; --p3:#3e7bd8; --p4:#6e7480;
    --brand:#2fb574; --brand-dim:#1e6b48;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--ink); color:var(--text);
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    display:flex;flex-direction:column;
    -webkit-user-select:none;user-select:none;
  }
  .app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top)}

  /* header */
  .head{padding:14px 18px 12px;border-bottom:1px solid var(--line-soft);flex-shrink:0}
  .head .row{display:flex;justify-content:space-between;align-items:flex-end}
  .date{font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;
    color:var(--muted);text-transform:uppercase}
  .brand{font-family:'Archivo',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.02em;
    line-height:1;margin-top:4px}
  .brand .r{color:var(--brand)}
  .progress{text-align:right}
  .progress .big{font-family:'Archivo',sans-serif;font-weight:800;font-size:23px;line-height:1}
  .progress .big .sub{color:var(--muted-2)}
  .progress .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted-2);
    letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
  .bar{height:4px;background:var(--line);border-radius:99px;margin-top:11px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--brand-dim),var(--brand));
    border-radius:99px;transition:width .45s cubic-bezier(.2,.8,.2,1)}

  /* legend */
  .legend{display:flex;justify-content:space-between;gap:8px;padding:9px 18px;
    border-bottom:1px solid var(--line-soft);
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.02em;color:var(--muted);flex-shrink:0}
  .legend .k{display:flex;align-items:center;gap:5px}
  .legend .sw{width:15px;height:15px;border-radius:4px;display:flex;align-items:center;
    justify-content:center;font-weight:600;color:#0b0c10;font-size:9.5px}

  /* grid */
  .grid{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
    gap:1px;background:var(--line-soft);overflow:hidden;min-height:0}
  .quad{background:var(--base);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .qhead{display:flex;align-items:center;gap:8px;padding:12px 12px 8px;flex-shrink:0}
  .qicon{width:26px;height:26px;border-radius:8px;background:var(--panel);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
  .qicon svg{width:14px;height:14px}
  .qname{font-family:'Archivo',sans-serif;font-weight:700;font-size:13.5px;flex:1}
  .qcount{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted-2);
    background:var(--panel);border-radius:99px;padding:2px 8px}
  .qlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 10px 12px;
    display:flex;flex-direction:column;gap:7px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent}
  .qlist::-webkit-scrollbar{width:4px}
  .qlist::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
  .empty{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted-2);
    text-align:center;padding:14px 6px;opacity:.6;letter-spacing:.03em}

  /* task */
  .task{display:flex;align-items:flex-start;gap:8px;background:var(--panel);
    border:1px solid var(--line-soft);border-radius:11px;padding:9px 6px 9px 8px;
    transition:transform .1s ease,border-color .15s ease,background .15s ease;width:100%}
  .task:active{transform:scale(.985)}
  .pri{width:20px;height:20px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;
    justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;
    color:#0b0c10;margin-top:1px}
  .pri.l1{background:var(--p1)} .pri.l2{background:var(--p2)}
  .pri.l3{background:var(--p3)} .pri.l4{background:var(--p4);color:#dfe2e8}
  .body{flex:1;cursor:pointer;min-width:0}
  .ttext{font-size:12.5px;line-height:1.32;font-weight:500;word-break:break-word}
  .tmeta{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted-2);margin-top:3px;letter-spacing:.02em}
  .tag{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--brand);margin-top:3px}
  .del{background:none;border:none;color:var(--muted-2);padding:2px 4px;cursor:pointer;
    flex-shrink:0;opacity:.55;font-size:0;border-radius:6px}
  .del svg{width:14px;height:14px}
  .del:active{opacity:1;color:var(--p1)}
  .task.done{opacity:.4}
  .task.done .ttext{text-decoration:line-through;text-decoration-color:var(--muted-2)}
  .task.done .pri{background:var(--brand)!important;color:#0b0c10}
  .ritual{background:linear-gradient(180deg,rgba(47,181,116,.12),rgba(47,181,116,.04));
    border:1px dashed var(--brand-dim)}
  .ritual .ttext{color:#bfe6d4;font-weight:600}

  /* footer actions */
  .foot{display:flex;justify-content:center;padding:8px;padding-bottom:calc(8px + var(--safe-bot));
    border-top:1px solid var(--line-soft);flex-shrink:0}
  .clear{background:none;border:none;color:var(--muted-2);font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:6px 12px}
  .clear:active{color:var(--text)}

  /* FAB */
  .fab{position:fixed;right:18px;bottom:calc(48px + var(--safe-bot));width:56px;height:56px;
    border-radius:50%;background:var(--brand);border:none;color:#062015;font-size:28px;cursor:pointer;
    z-index:20;box-shadow:0 10px 24px -6px rgba(47,181,116,.55);display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.94)}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(6,7,10,.6);opacity:0;pointer-events:none;
    transition:opacity .22s ease;z-index:25}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--panel);
    border-radius:22px 22px 0 0;padding:18px 18px calc(26px + var(--safe-bot));z-index:30;
    transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
    border-top:1px solid var(--line)}
  .sheet.open{transform:translateY(0)}
  .sheet h3{font-family:'Archivo',sans-serif;font-size:17px;font-weight:700;margin-bottom:14px}
  .sheet input{width:100%;background:var(--base);border:1px solid var(--line);border-radius:11px;
    padding:12px;color:var(--text);font-family:inherit;font-size:15px;margin-bottom:14px}
  .sheet input:focus{outline:none;border-color:var(--brand)}
  .fld{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted-2);margin-bottom:7px}
  .chips{display:flex;gap:7px;margin-bottom:15px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--base);color:var(--muted);border-radius:9px;
    padding:9px 11px;font-family:inherit;font-size:12.5px;cursor:pointer;font-weight:500;
    display:flex;align-items:center;gap:6px;transition:.14s}
  .chip.sel{border-color:var(--brand);background:rgba(47,181,116,.12);color:var(--text)}
  .chip .pri{width:17px;height:17px;font-size:10px}
  .chip svg{width:14px;height:14px}
  .add{width:100%;background:var(--brand);color:#062015;border:none;border-radius:12px;padding:14px;
    font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;cursor:pointer}
  .add:active{transform:scale(.99)}
  .add:disabled{opacity:.4}

  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <div class="row">
      <div>
        <div class="date" id="date">—</div>
        <div class="brand">Execu<span class="r">list</span></div>
      </div>
      <div class="progress">
        <div class="big"><span id="cleared">0</span><span class="sub">/<span id="total">0</span></span></div>
        <div class="lbl">cleared</div>
      </div>
    </div>
    <div class="bar"><i id="barfill"></i></div>
  </div>

  <div class="legend">
    <div class="k"><span class="sw" style="background:var(--p1)">1</span>Today</div>
    <div class="k"><span class="sw" style="background:var(--p2)">2</span>Tomorrow</div>
    <div class="k"><span class="sw" style="background:var(--p3)">3</span>Soon</div>
    <div class="k"><span class="sw" style="background:var(--p4);color:#dfe2e8">4</span>Horizon</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="foot"><button class="clear" id="clearBtn">Clear cleared tasks</button></div>
</div>

<button class="fab" id="fab" aria-label="New task">+</button>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="New task">
  <h3>New task</h3>
  <input id="tinput" type="text" placeholder="What needs doing?" autocomplete="off" enterkeyhint="done">
  <div class="fld">Which lane</div>
  <div class="chips" id="lanechips"></div>
  <div class="fld">Priority</div>
  <div class="chips pchips" id="prichips"></div>
  <button class="add" id="addbtn" disabled>Add to Execulist</button>
</div>

<script>
const ICONS = {
  do:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
  see:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>',
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>',
  call:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.6a2 2 0 0 1-.5 2.1L8 9.6a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.4c.8.3 1.7.5 2.6.6a2 2 0 0 1 1.7 2z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>'
};
const QUADS = [{key:'do',name:'To Do'},{key:'see',name:'To See'},{key:'send',name:'To Send'},{key:'call',name:'To Call'}];
const PRI_LABELS = {1:'Today',2:'Tomorrow',3:'Soon',4:'Horizon'};
const STORE_KEY = 'execulist.tasks.v1';

const SEED = [
  {lane:'do',pri:1,text:'Make tomorrow’s list',ritual:true},
  {lane:'do',pri:3,text:'Renew DCQ credential',meta:'due Q3'},
  {lane:'see',pri:1,text:'Walkthrough — 4412 Oakwood',meta:'8:00 AM'},
  {lane:'send',pri:1,text:'Estimate → Henderson reroof'},
  {lane:'call',pri:1,text:'GAF rep — shingle backorder'}
];

let TASKS = load();

function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const p = JSON.parse(raw); if(Array.isArray(p)) return p; }
  }catch(e){}
  // first run: seed with a few starter tasks
  const seeded = SEED.map((t,i)=>({id:'seed'+i, done:false, ...t}));
  save(seeded); return seeded;
}
function save(list){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(list)); }catch(e){} }
function persist(){ save(TASKS); }
function uid(){ return 't'+Date.now()+Math.random().toString(36).slice(2,7); }

const grid = document.getElementById('grid');
function render(){
  grid.innerHTML='';
  QUADS.forEach(q=>{
    const items = TASKS.filter(t=>t.lane===q.key).sort((a,b)=>a.pri-b.pri);
    const open = items.filter(t=>!t.done).length;
    const quad=document.createElement('div'); quad.className='quad';
    quad.innerHTML=`<div class="qhead"><div class="qicon">${ICONS[q.key]}</div>
      <div class="qname">${q.name}</div><div class="qcount">${open}</div></div><div class="qlist"></div>`;
    const list=quad.querySelector('.qlist');
    if(!items.length){ const e=document.createElement('div'); e.className='empty'; e.textContent='—'; list.appendChild(e); }
    items.forEach(t=>{
      const row=document.createElement('div');
      row.className='task'+(t.done?' done':'')+(t.ritual?' ritual':'');
      const meta = t.ritual?`<div class="tag">Every day · standing #1</div>`:(t.meta?`<div class="tmeta">${esc(t.meta)}</div>`:'');
      row.innerHTML=`<span class="pri l${t.pri}">${t.pri}</span>
        <div class="body"><div class="ttext">${esc(t.text)}</div>${meta}</div>
        <button class="del" aria-label="Delete">${ICONS.trash}</button>`;
      row.querySelector('.body').addEventListener('click',()=>{ t.done=!t.done; persist(); render(); });
      row.querySelector('.del').addEventListener('click',(ev)=>{
        ev.stopPropagation();
        if(confirm('Delete this task?')){ TASKS=TASKS.filter(x=>x.id!==t.id); persist(); render(); }
      });
      list.appendChild(row);
    });
    grid.appendChild(quad);
  });
  const total=TASKS.length, done=TASKS.filter(t=>t.done).length;
  document.getElementById('cleared').textContent=done;
  document.getElementById('total').textContent=total;
  document.getElementById('barfill').style.width=(total?done/total*100:0)+'%';
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// date
(function(){
  const d=new Date();
  const opt={weekday:'short',month:'short',day:'numeric'};
  document.getElementById('date').textContent=d.toLocaleDateString(undefined,opt).replace(',',' ·').toUpperCase();
})();

// clear done
document.getElementById('clearBtn').addEventListener('click',()=>{
  const n=TASKS.filter(t=>t.done).length;
  if(!n) return;
  if(confirm('Remove '+n+' cleared task'+(n>1?'s':'')+'?')){ TASKS=TASKS.filter(t=>!t.done); persist(); render(); }
});

// new-task sheet
const scrim=document.getElementById('scrim'), sheet=document.getElementById('sheet');
const fab=document.getElementById('fab'), addbtn=document.getElementById('addbtn'), tinput=document.getElementById('tinput');
let selLane=null, selPri=null;
const laneWrap=document.getElementById('lanechips');
QUADS.forEach(q=>{
  const c=document.createElement('button'); c.className='chip';
  c.innerHTML=`${ICONS[q.key]}<span>${q.name}</span>`;
  c.addEventListener('click',()=>{selLane=q.key;[...laneWrap.children].forEach(x=>x.classList.remove('sel'));c.classList.add('sel');ready();});
  laneWrap.appendChild(c);
});
const priWrap=document.getElementById('prichips');
[1,2,3,4].forEach(p=>{
  const c=document.createElement('button'); c.className='chip';
  c.innerHTML=`<span class="pri l${p}">${p}</span><span>${PRI_LABELS[p]}</span>`;
  c.addEventListener('click',()=>{selPri=p;[...priWrap.children].forEach(x=>x.classList.remove('sel'));c.classList.add('sel');ready();});
  priWrap.appendChild(c);
});
function ready(){ addbtn.disabled=!(selLane&&selPri&&tinput.value.trim()); }
tinput.addEventListener('input',ready);
function open(){ scrim.classList.add('open'); sheet.classList.add('open'); setTimeout(()=>tinput.focus(),220); }
function close(){ scrim.classList.remove('open'); sheet.classList.remove('open');
  selLane=selPri=null; tinput.value=''; [...laneWrap.children,...priWrap.children].forEach(x=>x.classList.remove('sel')); ready(); }
fab.addEventListener('click',open);
scrim.addEventListener('click',close);
function submit(){ if(addbtn.disabled) return;
  TASKS.push({id:uid(),lane:selLane,pri:selPri,text:tinput.value.trim(),done:false}); persist(); close(); render(); }
addbtn.addEventListener('click',submit);
tinput.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });

render();

// register service worker (relative path works on GitHub Pages subpaths)
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
